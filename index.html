<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guppy | Talk to Strangers!</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --blue: #007AFF; --bg: #F4F1EA; --red: #FF3B30; --green: #34C759; --gray: #8E8E93; --dark: #1C1C1E; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100dvh; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 900px; height: 90%; background: white; display: flex; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.05); position: relative; }
        .sidebar { width: 260px; padding: 25px; border-right: 1px solid #EEE; background: #FAFAFA; display: flex; flex-direction: column; gap: 15px; z-index: 2; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: white; }
        
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .me { background: var(--blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .stranger { background: white; border: 1px solid #DDD; align-self: flex-start; border-bottom-left-radius: 4px; }
        .system { align-self: center; font-size: 13px; color: var(--gray); font-weight: bold; margin: 10px 0; background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 12px; }
        
        .input-box { padding: 20px; border-top: 1px solid #EEE; display: flex; gap: 10px; background: white; align-items: center; }
        input[type="text"] { flex: 1; padding: 14px 18px; border-radius: 25px; border: 1px solid #DDD; outline: none; font-size: 15px; transition: border 0.2s; }
        input[type="text"]:focus { border-color: var(--blue); }
        .btn { padding: 12px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #typing-indicator { font-size: 12px; color: var(--gray); font-style: italic; padding: 0 20px; height: 15px; display: none; margin-bottom: 5px; }
        #tags { flex: none; padding: 12px 16px; font-size: 14px; }
        
        /* Game Styles */
        #game-container { display: none; flex: 1; position: relative; background: #a2d5f2; cursor: pointer; }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        #game-score { position: absolute; top: 20px; right: 30px; font-size: 32px; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        #game-msg { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-weight: bold; font-size: 24px; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); pointer-events: none; }
        .waiting-text { font-size: 14px; font-weight: normal; margin-top: 10px; opacity: 0.8; }

        /* Modals */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; display: flex; flex-direction: column; gap: 20px; width: 80%; max-width: 350px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        #warning-content { background: var(--red); color: white; }
        #call-content { background: var(--dark); color: white; }

        @media (max-width: 600px) { #app { height: 100dvh; border-radius: 0; flex-direction: column; } .sidebar { width: auto; height: auto; border-right: none; border-bottom: 1px solid #EEE; padding: 15px; } .chat-area { height: 0; flex: 1; } }
    </style>
</head>
<body>

<audio id="remoteAudio" autoplay></audio>

<div id="app">
    <div class="sidebar">
        <h2 style="margin:0;">🐟 Guppy</h2>
        <p style="color: var(--gray); margin:0; font-size: 14px;">Online: <span id="count" style="color: var(--green); font-weight: bold;">0</span></p>
        
        <input type="text" id="tags" placeholder="Interests (coding, finance...)">
        
        <div id="start-controls" style="display: flex; flex-direction: column; gap: 10px;">
            <button class="btn" style="background: var(--blue);" onclick="joinQueue('text')">Text Chat</button>
            <button class="btn" style="background: var(--dark);" onclick="joinQueue('voice')">Voice Only</button>
        </div>
        
        <div id="active-controls" style="display:none; flex-direction: column; gap: 10px; margin-top: auto;">
            <button class="btn" id="call-btn" style="background: var(--green);" onclick="requestCall()">📞 Request Call</button>
            <button class="btn" id="skip-btn" style="background: var(--red);" onclick="handleSkip()">Skip (Esc)</button>
            <button class="btn" style="background: transparent; color: var(--gray); border: 1px solid #DDD;" onclick="reportUser()">Report Stranger</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages">
            <div class="system">Select your interest and start chatting.</div>
        </div>
        
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            <div id="game-score">0</div>
            <div id="game-msg">Tap to Swim!<div class="waiting-text">Searching for a stranger...</div></div>
        </div>

        <div id="typing-indicator">Stranger is typing...</div>
        <div class="input-box">
            <input type="text" id="chat-input" placeholder="Type a message..." disabled onkeypress="handleTyping(event)">
            <button class="btn" id="send-btn" style="background: var(--blue);" onclick="sendMessage()" disabled>Send</button>
        </div>
    </div>

    <div class="modal" id="warning-modal">
        <div class="modal-content" id="warning-content">
            <h2 id="warn-msg" style="margin:0;">daddy chill!, or else you will get banned</h2>
            <button class="btn" style="background: white; color: var(--red);" onclick="dismissWarning()">I UNDERSTAND</button>
        </div>
    </div>

    <div class="modal" id="call-modal">
        <div class="modal-content" id="call-content">
            <h2 style="margin:0;">📞 Incoming Voice Call</h2>
            <p style="margin:0; color: #AAA;">Stranger wants to voice call, accept?</p>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn" style="flex: 1; background: var(--green);" onclick="acceptCall()">Accept</button>
                <button class="btn" style="flex: 1; background: var(--red);" onclick="rejectCall()">Decline</button>
            </div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const peer = new Peer(); 
    const uuid = 'user-' + Math.random().toString(36).substr(2, 9);
    
    let myPeerId = null;
    let partnerPeerId = null;
    let currentMode = 'text';
    let skipState = 0; 
    let skipTimer;
    let typingTimer;
    let myStream = null;

    // --- FLAPPY GUPPY LOGIC ---
    let canvas, ctx, gameLoopId;
    let guppy = { x: 50, y: 150, velocity: 0, gravity: 0.5, jump: -7 };
    let pipes = [];
    let frame = 0, score = 0;
    let gameRunning = false;
    let gameInitialized = false;

    function initGame() {
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Touch / Click to flap
        document.getElementById('game-container').addEventListener('mousedown', flap);
        document.getElementById('game-container').addEventListener('touchstart', (e) => { e.preventDefault(); flap(); });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space' && gameRunning) { e.preventDefault(); flap(); } });
        gameInitialized = true;
    }

    function resizeCanvas() {
        if(canvas && document.getElementById('game-container').style.display === 'block') {
            canvas.width = document.getElementById('game-container').clientWidth;
            canvas.height = document.getElementById('game-container').clientHeight;
        }
    }

    function flap() {
        if (!gameRunning) return;
        guppy.velocity = guppy.jump;
        document.getElementById('game-msg').style.display = 'none';
    }

    function startGame() {
        document.getElementById('messages').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        if (!gameInitialized) initGame();
        resizeCanvas();
        
        guppy.y = canvas.height / 2;
        guppy.velocity = 0;
        pipes = [];
        frame = 0;
        score = 0;
        gameRunning = true;
        document.getElementById('game-score').innerText = score;
        document.getElementById('game-msg').style.display = 'block';
        document.getElementById('game-msg').innerHTML = 'Tap to Swim!<div class="waiting-text">Searching for a stranger...</div>';
        
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function stopGame() {
        gameRunning = false;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('messages').style.display = 'flex';
    }

    function gameOver() {
        gameRunning = false;
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        document.getElementById('game-msg').style.display = 'block';
        document.getElementById('game-msg').innerHTML = 'Ouch! Tap to Restart<div class="waiting-text">Still searching...</div>';
        
        // Restart on next tap
        setTimeout(() => {
            document.getElementById('game-container').addEventListener('mousedown', restartGame, { once: true });
            document.getElementById('game-container').addEventListener('touchstart', restartGame, { once: true });
        }, 300);
    }

    function restartGame() {
        if (document.getElementById('game-container').style.display === 'block') {
            startGame();
        }
    }

    function gameLoop() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Physics
        guppy.velocity += guppy.gravity;
        guppy.y += guppy.velocity;
        
        // Draw Fish
        ctx.font = "35px Arial";
        ctx.fillText("🐟", guppy.x, guppy.y);

        // Spawn Pipes
        if (frame % 100 === 0) {
            let gap = 140;
            let topHeight = Math.random() * (canvas.height - gap - 60) + 30;
            pipes.push({ x: canvas.width, top: topHeight, bottom: topHeight + gap, width: 45, passed: false });
        }

        ctx.fillStyle = "#34C759"; // Green Seaweed
        for (let i = 0; i < pipes.length; i++) {
            let p = pipes[i];
            p.x -= 3; // Speed
            
            // Draw Pipes
            ctx.fillRect(p.x, 0, p.width, p.top);
            ctx.fillRect(p.x, p.bottom, p.width, canvas.height - p.bottom);

            // Collision Detection
            let fishBox = { x: guppy.x + 5, y: guppy.y - 25, width: 25, height: 25 };
            if (fishBox.x < p.x + p.width && fishBox.x + fishBox.width > p.x && 
                (fishBox.y < p.top || fishBox.y + fishBox.height > p.bottom)) {
                gameOver();
                return;
            }

            // Score
            if (p.x + p.width < guppy.x && !p.passed) {
                score++;
                p.passed = true;
                document.getElementById('game-score').innerText = score;
            }
        }

        // Floor / Ceiling Collision
        if (guppy.y > canvas.height || guppy.y < 20) {
            gameOver();
            return;
        }

        pipes = pipes.filter(p => p.x + p.width > 0);
        frame++;
        gameLoopId = requestAnimationFrame(gameLoop);
    }
    // --- END GAME LOGIC ---

    peer.on('open', (id) => {
        myPeerId = id;
        socket.emit('authenticate', { uuid: uuid, peerId: id });
    });

    socket.on('update-count', c => document.getElementById('count').innerText = c);

    // --- CORE FLOW ---
    function joinQueue(mode) {
        currentMode = mode;
        const tags = document.getElementById('tags').value;
        socket.emit('find-match', { mode: mode, tags: tags });
        
        document.getElementById('start-controls').style.display = 'none';
        document.getElementById('active-controls').style.display = 'flex';
        document.getElementById('call-btn').style.display = mode === 'voice' ? 'none' : 'flex';
        disableInput();
        
        // TRIGGER THE GAME!
        startGame();
    }

    socket.on('match-found', (data) => {
        partnerPeerId = data.peerId;
        
        // STOP GAME AND SHOW CHAT
        stopGame();
        document.getElementById('messages').innerHTML = '<div class="system">Stranger connected! Say hi.</div>';
        
        if (currentMode === 'text') {
            enableInput();
        } else if (currentMode === 'voice') {
            startCall(partnerPeerId);
            document.getElementById('messages').innerHTML += '<div class="system">Connecting voice...</div>';
        }
    });

    // --- SMART SKIP ---
    function handleSkip() {
        const btn = document.getElementById('skip-btn');
        if (skipState === 0) {
            skipState = 1;
            btn.innerText = "Are you sure?";
            skipTimer = setTimeout(() => {
                skipState = 0;
                btn.innerText = "Skip (Esc)";
            }, 3000);
        } else {
            clearTimeout(skipTimer);
            executeSkip();
        }
    }

    function executeSkip() {
        socket.emit('leave-chat');
        resetChatUI();
        joinQueue(currentMode); 
    }

    function resetChatUI() {
        partnerPeerId = null;
        skipState = 0;
        document.getElementById('skip-btn').innerText = "Skip (Esc)";
        document.getElementById('call-btn').innerText = "📞 Request Call";
        document.getElementById('call-btn').disabled = false;
        disableInput();
        if(myStream) {
            myStream.getTracks().forEach(track => track.stop());
            myStream = null;
        }
    }

    // --- MESSAGING & TYPING ---
    function sendMessage() {
        const input = document.getElementById('chat-input');
        if (input.value.trim()) {
            socket.emit('send-msg', input.value);
            addMessage(input.value, 'me');
            input.value = '';
        }
    }

    function handleTyping(e) {
        if (e.key === 'Enter') {
            sendMessage();
        } else {
            socket.emit('typing');
        }
    }

    socket.on('receive-msg', m => {
        document.getElementById('typing-indicator').style.display = 'none';
        addMessage(m, 'stranger');
    });

    socket.on('stranger-typing', () => {
        const ind = document.getElementById('typing-indicator');
        ind.style.display = 'block';
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => ind.style.display = 'none', 1500);
    });

    socket.on('stranger-left', () => {
        addMessage('Stranger has disconnected.', 'system');
        resetChatUI();
        document.getElementById('active-controls').style.display = 'none';
        document.getElementById('start-controls').style.display = 'flex';
    });

    // --- VOICE CALL LOGIC (WebRTC) ---
    function requestCall() {
        socket.emit('request-call');
        document.getElementById('call-btn').innerText = "Ringing...";
        document.getElementById('call-btn').disabled = true;
    }

    socket.on('incoming-call', () => {
        document.getElementById('call-modal').style.display = 'flex';
    });

    socket.on('call-accepted', () => {
        document.getElementById('call-btn').innerText = "On Call 🟢";
        document.getElementById('call-btn').disabled = true;
        addMessage('Stranger accepted the call.', 'system');
    });

    function acceptCall() {
        document.getElementById('call-modal').style.display = 'none';
        socket.emit('accept-call'); 
        addMessage('Voice call started.', 'system');
        startCall(partnerPeerId);
    }

    function rejectCall() {
        document.getElementById('call-modal').style.display = 'none';
        addMessage('You declined the call.', 'system');
    }

    async function startCall(id) {
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            const call = peer.call(id, myStream);
            document.getElementById('call-btn').innerText = "On Call 🟢";
            document.getElementById('call-btn').disabled = true;
            call.on('stream', remoteStream => {
                document.getElementById('remoteAudio').srcObject = remoteStream;
            });
        } catch (err) {
            addMessage('Microphone access denied.', 'system');
            document.getElementById('call-btn').innerText = "📞 Request Call";
            document.getElementById('call-btn').disabled = false;
        }
    }

    peer.on('call', (call) => {
        navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then((stream) => {
            myStream = stream;
            document.getElementById('call-btn').innerText = "On Call 🟢";
            document.getElementById('call-btn').disabled = true;
            call.answer(stream);
            call.on('stream', remoteStream => {
                document.getElementById('remoteAudio').srcObject = remoteStream;
            });
        }).catch(err => {
            addMessage('Microphone access denied for incoming call.', 'system');
        });
    });

    // --- UTILS & MODERATION ---
    function reportUser() {
        socket.emit('report-user');
        executeSkip();
    }

    socket.on('show-warning', t => {
        document.getElementById('warn-msg').innerText = t;
        document.getElementById('warning-modal').style.display = 'flex';
        disableInput();
    });

    function dismissWarning() {
        document.getElementById('warning-modal').style.display = 'none';
        enableInput();
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = 'msg ' + type;
        div.innerText = text;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function enableInput() {
        document.getElementById('chat-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('chat-input').focus();
    }

    function disableInput() {
        document.getElementById('chat-input').disabled = true;
        document.getElementById('send-btn').disabled = true;
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === "Escape" && document.getElementById('active-controls').style.display !== 'none') {
            handleSkip();
        }
    });
</script>
</body>
</html>
