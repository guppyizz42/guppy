<div id="app">
    <div class="sidebar">
        <h2>🐟 GUPPY</h2>
        <div class="status-bar">
            <span>Nodes: <span id="count">0</span></span>
        </div>
        
        <div id="start-controls">
            <button class="btn btn-blue" onclick="window.joinQueue('text')">Text Node</button>
            <button class="btn" onclick="window.joinQueue('voice')">Voice Node</button>
        </div>

        <div class="plugin-btns" style="margin-top:20px; display:flex; flex-direction:column; gap:5px;">
            <button class="btn btn-dark" onclick="window.toggleVoid()">🌀 VOID</button>
            <button class="btn btn-dark" onclick="window.toggleEgo()">👁️ EGO</button>
            <button class="btn btn-dark" onclick="window.toggleGame()">🎮 ARCADE</button>
        </div>

        <div id="active-controls" style="display:none; margin-top:auto;">
            <button class="btn btn-red" onclick="window.handleSkip()">SKIP (ESC)</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages"></div>
        <div class="input-box">
            <input type="text" id="chat-input" placeholder="Transmit..." disabled>
            <button class="btn" onclick="window.sendMessage()">SEND</button>
        </div>
    </div>
</div>

<audio id="remote-audio" autoplay></audio>

<script src="client.js"></script>
<script src="void.js"></script>
<script src="voice.js"></script>
<script src="ego.js"></script>
<script src="arcade.js"></script>
