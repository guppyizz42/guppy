<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guppy | Chat</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --blue: #007AFF; --bg: #F4F1EA; --red: #FF3B30; --green: #34C759; --gray: #8E8E93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100dvh; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 900px; height: 90%; background: white; display: flex; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .sidebar { width: 260px; padding: 25px; border-right: 1px solid #EEE; background: #FAFAFA; display: flex; flex-direction: column; gap: 15px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: white; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; }
        .me { background: var(--blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .stranger { background: white; border: 1px solid #DDD; align-self: flex-start; border-bottom-left-radius: 4px; }
        .system { align-self: center; font-size: 13px; color: var(--gray); font-weight: bold; margin: 10px 0; }
        .input-box { padding: 20px; border-top: 1px solid #EEE; display: flex; gap: 10px; background: white; }
        input[type="text"] { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #DDD; outline: none; font-size: 15px; }
        .btn { padding: 12px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        
        /* Warning Modal Styles */
        #warning-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--red); color: white; padding: 30px; border-radius: 20px; text-align: center; z-index: 1000; box-shadow: 0 20px 60px rgba(0,0,0,0.4); flex-direction: column; gap: 20px; width: 80%; }
        
        @media (max-width: 600px) { #app { height: 100dvh; border-radius: 0; flex-direction: column; } .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #EEE; } }
    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">
        <h2 style="margin:0;">🐟 Guppy</h2>
        <p style="color: var(--gray); margin:0;">Online: <span id="count" style="color: var(--green); font-weight: bold;">0</span></p>
        <input type="text" id="tags" placeholder="Interests (talk, art...)">
        <button class="btn" id="start-btn" style="background: var(--blue);" onclick="startChat()">Start Chat</button>
        
        <div id="active-controls" style="display:none; flex-direction: column; gap: 10px; margin-top: auto;">
            <button class="btn" id="skip-btn" style="background: var(--red);" onclick="handleSkip()">Skip (Esc)</button>
            <button class="btn" id="report-btn" style="background: var(--gray);" onclick="reportUser()">Report</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="warning-modal">
            <h2 id="warn-msg" style="margin:0;">daddy chill!, or else you will get banned</h2>
            <button class="btn" style="background: white; color: var(--red);" onclick="dismissWarning()">I UNDERSTAND</button>
        </div>
        <div id="messages">
            <div class="system">Select a tag and press Start to begin.</div>
        </div>
        <div class="input-box">
            <input type="text" id="chat-input" placeholder="Type a message..." disabled onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="btn" style="background: var(--blue);" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const uuid = 'user-' + Math.random().toString(36).substr(2, 9);
    let skipState = 0; // 0 = normal, 1 = confirm
    let skipTimer;

    socket.emit('authenticate', uuid);
    socket.on('update-count', c => document.getElementById('count').innerText = c);

    function startChat() {
        const tags = document.getElementById('tags').value;
        socket.emit('find-match', { mode: 'text', tags: tags });
        document.getElementById('messages').innerHTML = '<div class="system">Searching for a stranger...</div>';
        document.getElementById('start-btn').disabled = true;
    }

    socket.on('match-found', () => {
        document.getElementById('messages').innerHTML = '<div class="system">Stranger connected! Say hi.</div>';
        document.getElementById('chat-input').disabled = false;
        document.getElementById('chat-input').focus();
        document.getElementById('active-controls').style.display = 'flex';
        document.getElementById('start-btn').style.display = 'none';
    });

    function sendMessage() {
        const input = document.getElementById('chat-input');
        if (input.value.trim()) {
            socket.emit('send-msg', input.value);
            addMessage(input.value, 'me');
            input.value = '';
        }
    }

    function handleSkip() {
        const btn = document.getElementById('skip-btn');
        if (skipState === 0) {
            skipState = 1;
            btn.innerText = "Are you sure?";
            skipTimer = setTimeout(() => {
                skipState = 0;
                btn.innerText = "Skip (Esc)";
            }, 3000);
        } else {
            clearTimeout(skipTimer);
            executeSkip();
        }
    }

    function executeSkip() {
        socket.emit('leave-chat');
        location.reload(); 
    }

    function reportUser() {
        socket.emit('report-user');
        executeSkip();
    }

    socket.on('receive-msg', m => addMessage(m, 'stranger'));
    
    socket.on('stranger-left', () => {
        addMessage('Stranger has disconnected.', 'system');
        document.getElementById('chat-input').disabled = true;
    });

    socket.on('show-warning', t => {
        document.getElementById('warn-msg').innerText = t;
        document.getElementById('warning-modal').style.display = 'flex';
        document.getElementById('chat-input').disabled = true;
    });

    function dismissWarning() {
        document.getElementById('warning-modal').style.display = 'none';
        document.getElementById('chat-input').disabled = false;
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = 'msg ' + type;
        div.innerText = text;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === "Escape") handleSkip();
    });
</script>
</body>
</html>
