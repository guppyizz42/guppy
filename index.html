<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guppy | Arcade</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<audio id="remoteAudio" autoplay></audio>
<div id="app">
    <div class="sidebar">
        <h2 style="margin:0;">🐟 Guppy</h2>
        <p style="color:var(--gray); font-size:12px;">Online: <span id="count">0</span></p>
        <input type="text" id="tags" placeholder="Interests...">
        <div class="control-group">
            <button class="btn btn-blue" onclick="joinQueue('text')">Text Chat</button>
            <button class="btn btn-dark" onclick="joinQueue('voice')">Voice Only</button>
        </div>
        <div style="margin-top:10px; display:flex; flex-direction:column; gap:5px;">
            <div class="btn" style="background:#a2d5f2; color:#005f8d; text-align:center;" onclick="startGame()">🎮 Play Game</div>
            <div class="btn" style="background:#000; text-align:center;" onclick="toggleVoid()">🌀 The Void</div>
            <div class="btn" style="background:#fff; color:#000; border:1px solid #000; text-align:center;" onclick="toggleEgo()">👁️ Ego Portal</div>
        </div>
        <div id="active-controls" style="display:none; margin-top:auto; flex-direction:column; gap:5px;">
            <button class="btn btn-green" id="call-btn" onclick="requestCall()">📞 Call</button>
            <button class="btn btn-red" onclick="handleSkip()">Skip</button>
        </div>
    </div>
    <div class="chat-area">
        <div id="game-container" style="display:none; flex:1; background:#a2d5f2; position:relative;">
            <canvas id="gameCanvas"></canvas>
            <div id="score" style="position:absolute; top:10px; right:20px; font-size:24px; color:white;">0</div>
        </div>
        <div id="messages"></div>
        <div class="input-box">
            <input type="text" id="chat-input" placeholder="Type..." disabled onkeypress="handleTyping(event)">
            <button class="btn btn-blue" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>
<script src="client.js"></script>
</body>
</html>
