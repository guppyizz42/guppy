<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUPPY | VOID</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="void-tunnel"></div>

<div id="app">
    <div class="sidebar">
        <h2>🐟 GUPPY</h2>
        <p>Online: <span id="count">0</span></p>
        <input type="text" id="tags" placeholder="Interests...">
        
        <div id="start-controls" style="display:flex; flex-direction:column; gap:5px;">
            <button class="btn btn-blue" onclick="joinQueue('text')">Text Chat</button>
            <button class="btn" onclick="joinQueue('voice')">Voice Only</button>
        </div>

        <div style="margin-top:20px; display:flex; flex-direction:column; gap:8px;">
            <div class="btn" onclick="toggleGame()">🎮 THE ARCADE</div>
            <div class="btn" onclick="toggleVoid()" style="background:black; color:white;">🌀 THE VOID</div>
            <div class="btn" onclick="toggleEgo()">👁️ EGO PORTAL</div>
        </div>

        <div id="active-controls" style="display:none; margin-top:auto; flex-direction:column; gap:5px;">
            <button class="btn btn-red" onclick="handleSkip()">SKIP (ESC)</button>
        </div>
    </div>

    <div class="chat-area">
        <div id="game-container" style="display:none; flex:1; position:relative; background:#2e2e2e;">
            <canvas id="gameCanvas"></canvas>
            <div id="score" style="position:absolute; top:10px; right:20px; color:white; font-size:20px;">0</div>
        </div>
        <div id="messages"></div>
        <div class="input-box">
            <input type="text" id="chat-input" placeholder="Type..." disabled onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>
</div>

<script src="client.js"></script>
<script src="arcade.js"></script>
<script src="void.js"></script>
<script src="ego.js"></script>
</body>
</html>
