<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GUPPY | Mesh</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<div id="app">
    <div class="sidebar">
        <h2>GUPPY</h2>
        <div id="count">0</div>
        <div id="start-controls">
            <button onclick="window.joinQueue('text')">Text Node</button>
            <button onclick="window.joinQueue('voice')">Voice Node</button>
            <button onclick="window.joinQueue('video')">Video Node</button>
        </div>
        <div id="active-controls" style="display:none;">
            <button onclick="window.requestVideo()">📹 Video Call</button>
            <button onclick="window.handleSkip()">SKIP (ESC)</button>
        </div>
    </div>
    <div class="chat-area" id="chat-viewport">
        <div id="messages"></div>
        <input type="text" id="chat-input" disabled>
    </div>
</div>

<div id="call-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center;">
    <div style="background:#222; padding:20px; border:1px solid #39ff14; text-align:center;">
        <h3>Incoming Video...</h3>
        <button onclick="window.acceptCall()">ACCEPT</button>
        <button onclick="window.denyCall()">DENY</button>
    </div>
</div>

<audio id="remote-audio" autoplay></audio>
<script src="client.js"></script>
<script src="void.js"></script>
<script src="voice.js"></script>
<script src="ego.js"></script>
<script src="arcade.js"></script>
</body>
</html>
